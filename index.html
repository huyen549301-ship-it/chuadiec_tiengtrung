<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Chữa điếc tiếng Trung</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<style>
    body { padding: 20px; font-family: sans-serif; }
    .hidden { display: none; }
    .item-flex { display: flex; justify-content: space-between; align-items: center; border: 1px solid #ddd; padding: 10px; margin-bottom: 5px; background: #fff; cursor: move; border-radius: 4px; }
    .modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s; }
    .modal-overlay.show { visibility: visible; opacity: 1; }
    .modal-box { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; }
</style>
</head>
<body>
<div class="container" style="max-width: 800px;">
    <h1>🎧 Chữa điếc tiếng Trung</h1>
    <select id="role" class="form-select mb-3" onchange="toggleRole()">
        <option value="student">Học viên</option>
        <option value="teacher">Giáo viên</option>
    </select>

    <!-- Modal Xác nhận -->
    <div id="generalModal" class="modal-overlay">
        <div class="modal-box">
            <h4 id="modalTitle">Thông báo</h4>
            <p id="modalMsg" class="my-4"></p>
            <button class="btn btn-secondary" onclick="closeModal()">Đóng</button>
            <button id="confirmBtn" class="btn btn-danger" onclick="confirmAction()">Đồng ý</button>
        </div>
    </div>

    <!-- Giao diện Giáo viên -->
    <div id="teacher" class="hidden card p-3 mb-4 border-warning">
        <div class="input-group mb-3">
            <input type="text" id="newTopicTitle" class="form-control" placeholder="Tên bài học...">
            <button class="btn btn-primary" onclick="createNewTopic()">Tạo</button>
            <button class="btn btn-danger" onclick="deleteCurrentTopic()">Xóa bài</button>
        </div>
        <textarea id="ans" class="form-control mb-2" placeholder="Đáp án (Chữ Hán)..."></textarea>
        <input type="text" id="audioUrlInput" class="form-control mb-2" placeholder="Link nhạc .mp3 (Dán vào đây)...">
        <button class="btn btn-success w-100" onclick="addQuestion()">Thêm câu hỏi</button>
        <h5 class="mt-4">Kéo thả để sắp xếp:</h5>
        <div id="questionList"></div>
        <button class="btn btn-dark w-100 mt-3" onclick="exportJSON()">💾 Tải file data.json</button>
    </div>

    <!-- Giao diện Học viên -->
    <div id="student" class="card p-3 border-success">
        <audio id="player" controls class="w-100 mb-3"></audio>
        <textarea id="txt" class="form-control mb-3" rows="3" placeholder="Nhập đáp án..."></textarea>
        <button class="btn btn-success w-100" onclick="check()">Chấm điểm</button>
    </div>
</div>

<script>
    let database = [{ title: "Bài 1", questions: [] }], currentTopicIdx = 0, pendingAction = null;
    let listEl = document.getElementById('questionList');
    new Sortable(listEl, { animation: 150, onEnd: updateOrder });

    function showModal(title, msg, isConfirm = false, action = null) {
        document.getElementById('modalTitle').innerText = title;
        document.getElementById('modalMsg').innerText = msg;
        document.getElementById('confirmBtn').style.display = isConfirm ? 'inline-block' : 'none';
        pendingAction = action;
        document.getElementById('generalModal').classList.add('show');
    }
    function closeModal() { document.getElementById('generalModal').classList.remove('show'); }
    function confirmAction() { if(pendingAction) pendingAction(); closeModal(); }

    function toggleRole() {
        let role = document.getElementById('role').value;
        document.getElementById('teacher').classList.toggle('hidden', role !== 'teacher');
        document.getElementById('student').classList.toggle('hidden', role !== 'student');
    }

    function addQuestion() {
        let text = document.getElementById('ans').value;
        let url = document.getElementById('audioUrlInput').value;
        if(!text) return alert("Nhập đáp án!");
        database[currentTopicIdx].questions.push({ answer: text, audio: url });
        renderQuestions();
    }

    function renderQuestions() {
        listEl.innerHTML = database[currentTopicIdx].questions.map((q, i) => `
            <div class="item-flex">
                <span>${i+1}. ${q.answer}</span>
                <button class="btn btn-sm btn-danger" onclick="confirmDelete(${i})">Xóa</button>
            </div>`).join('');
    }

    function confirmDelete(i) {
        showModal("Xóa câu hỏi", "Xóa câu này?", true, () => {
            database[currentTopicIdx].questions.splice(i, 1);
            renderQuestions();
        });
    }

    function updateOrder() {
        let newQuestions = [];
        [...listEl.children].forEach(item => {
            let i = parseInt(item.innerText.split('.')[0]) - 1;
            newQuestions.push(database[currentTopicIdx].questions[i]);
        });
        database[currentTopicIdx].questions = newQuestions;
        renderQuestions();
    }

    function deleteCurrentTopic() {
        showModal("Xóa bài", "Xóa sạch bài này?", true, () => {
            database.splice(currentTopicIdx, 1);
            renderQuestions();
        });
    }

    function check() {
        // Logic chấm điểm hiện có
        showModal("Kết quả", "Bạn đã hoàn thành bài học! 🎉");
    }

    function exportJSON() {
        let a = document.createElement("a");
        a.href = URL.createObjectURL(new Blob([JSON.stringify(database)], {type: "application/json"}));
        a.download = "data.json"; a.click();
    }
</script>
</body>
</html>
