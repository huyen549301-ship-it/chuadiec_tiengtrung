<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Chữa điếc tiếng Trung</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<style>
body{padding:20px; transition: background 0.3s, color 0.3s; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;}
.dark{background:#1e1e1e;color:#eee}
.dark .card {background:#2d2d2d; color:#eee; border-color: #444;}
.dark .form-control {background:#2d2d2d; color:#eee; border-color: #555;}

.hidden{display:none}
.item-flex {display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding: 10px; cursor: move; background: white; margin-bottom: 5px; border-radius: 4px; box-shadow: 0 1px 2px rgba(0,0,0,0.1);}
.dark .item-flex {background: #3d3d3d; border-bottom: 1px solid #555;}
.drag-handle {cursor: grab; margin-right: 10px; color: #999;}

/* Modal Overlay */
.modal-overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.6); display: flex; justify-content: center; align-items: center; z-index: 2000; visibility: hidden; opacity: 0; transition: 0.3s; }
.modal-overlay.show { visibility: visible; opacity: 1; }
.modal-box { background: white; padding: 30px; border-radius: 15px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.3); }
.dark .modal-box { background: #2d2d2d; color: #eee; }
</style>
</head>
<body>
<div class="container" style="max-width: 900px;">
<h1>🎧 Chữa điếc tiếng Trung</h1>

<!-- Modal Thông báo Chung -->
<div id="generalModal" class="modal-overlay">
  <div class="modal-box">
    <h4 id="modalTitle">Thông báo</h4>
    <p id="modalMsg" class="my-4"></p>
    <div id="modalActions">
      <button class="btn btn-secondary" onclick="closeModal()">Đóng</button>
      <button id="confirmBtn" class="btn btn-danger" onclick="confirmAction()">Đồng ý</button>
    </div>
  </div>
</div>

<!-- Giao diện Giáo viên -->
<div id="teacher" class="hidden card p-4 mb-4 border-warning shadow-sm">
  <h3 class="text-warning">🛠️ Khu vực Quản lý</h3>
  <div class="input-group mb-3">
    <input type="text" id="newTopicTitle" class="form-control" placeholder="Tên bài mới...">
    <button class="btn btn-primary" onclick="createNewTopic()">Tạo</button>
    <button class="btn btn-outline-danger" onclick="deleteCurrentTopic()">Xóa bài học</button>
  </div>
  
  <textarea id="ans" class="form-control mb-2" rows="2" placeholder="Nhập đáp án..."></textarea>
  <input type="text" id="audioUrlInput" class="form-control mb-2" placeholder="Dán link .mp3...">
  <button class="btn btn-success w-100" onclick="addQuestion()">Thêm câu hỏi</button>
  
  <h5 class="mt-4">Kéo thả để sắp xếp:</h5>
  <div id="questionList"></div>
  <button class="btn btn-danger w-100 mt-4" onclick="exportJSON()">💾 Tải File data.json</button>
</div>

<!-- Giao diện Học viên -->
<div id="student" class="card p-4 border-success">
  <audio id="player" controls class="w-100 mb-3"></audio>
  <textarea id="txt" class="form-control mb-3" rows="3" placeholder="Nhập đáp án..."></textarea>
  <button class="btn btn-success" onclick="check()">Chấm điểm</button>
</div>
</div>

<script>
let database = [], currentTopicIdx = 0, currentQuestionIdx = 0, pendingAction = null;
let questionListEl = document.getElementById('questionList');

// Khởi tạo Sortable để kéo thả
new Sortable(questionListEl, { animation: 150, onEnd: function() { updateOrder(); } });

function showModal(title, msg, isConfirm = false, action = null) {
  document.getElementById('modalTitle').innerText = title;
  document.getElementById('modalMsg').innerText = msg;
  document.getElementById('confirmBtn').style.display = isConfirm ? 'inline-block' : 'none';
  pendingAction = action;
  document.getElementById('generalModal').classList.add('show');
}
function closeModal() { document.getElementById('generalModal').classList.remove('show'); }
function confirmAction() { if(pendingAction) pendingAction(); closeModal(); }

function addQuestion() {
  let text = document.getElementById('ans').value;
  let url = document.getElementById('audioUrlInput').value;
  database[currentTopicIdx].questions.push({ answer: text, audio: url });
  renderQuestions();
}

function renderQuestions() {
  questionListEl.innerHTML = database[currentTopicIdx].questions.map((q, i) => `
    <div class="item-flex">
      <span>${i+1}. ${q.answer}</span>
      <button class="btn btn-sm btn-danger" onclick="confirmDeleteQuestion(${i})">Xóa</button>
    </div>`).join('');
}

function confirmDeleteQuestion(i) {
  showModal("Xóa câu hỏi", "Bạn có chắc muốn xóa câu này?", true, () => {
    database[currentTopicIdx].questions.splice(i, 1);
    renderQuestions();
  });
}

function updateOrder() {
  let items = [...questionListEl.children];
  let newOrder = items.map(item => {
    let index = parseInt(item.innerText.split('.')[0]) - 1;
    return database[currentTopicIdx].questions[index];
  });
  database[currentTopicIdx].questions = newOrder;
  renderQuestions();
}

function deleteCurrentTopic() {
  showModal("Xóa bài học", "Xóa sạch toàn bộ bài này?", true, () => {
    database.splice(currentTopicIdx, 1);
    // ... logic chuyển bài
  });
}

function nextLesson() {
  if (currentQuestionIdx >= database[currentTopicIdx].questions.length - 1) {
    showModal("Hoàn thành", "Bạn đã hoàn thành bài học! 🎉");
  } else {
    currentQuestionIdx++;
    // ... logic tải câu tiếp theo
  }
}

// Giữ lại các hàm cũ như exportJSON, fetchCloudData... ở đây
</script>
</body>
</html>
